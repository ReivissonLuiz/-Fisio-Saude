name: fisio_saude
description: "+Físio +Saúde — Plataforma digital de suporte fisioterapêutico"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # HTTP client para comunicação com a API Node.js
  http: ^1.2.1

  # Armazenamento local do token JWT
  shared_preferences: ^2.2.3

  # Máscaras de input (CPF, telefone, CEP)
  mask_text_input_formatter: ^2.9.0

  # Ícones e fontes
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
